<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modül 5 — AI Tarlada: Bitki Hastalığı ve Verim Tahmini</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif}
body{background:#f0f4f0;display:flex;flex-direction:column}

.header{background:#1a2e1a;padding:10px 24px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #4caf50}
.badge{background:#4caf50;color:white;font-size:10px;font-weight:800;letter-spacing:2px;padding:4px 12px;border-radius:4px}
.header h1{font-size:16px;font-weight:800;color:#e8f5e9;letter-spacing:0.5px}
.acc-display{display:flex;align-items:center;gap:8px}
.acc-val{font-family:'Fira Code',monospace;font-size:22px;font-weight:700;color:#66bb6a}
.acc-lbl{font-size:11px;color:rgba(232,245,233,0.5);letter-spacing:1px}

.main{flex:1;display:grid;grid-template-columns:260px 1fr 280px;gap:0;overflow:hidden;min-height:0}

/* LEFT: Plant selector */
.left-panel{
  background:white;
  border-right:1px solid #e0e0e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.panel-header{padding:14px 16px;background:#f5f5f5;border-bottom:1px solid #e0e0e0;font-size:11px;font-weight:800;letter-spacing:2px;color:#555;text-transform:uppercase}

.plant-list{flex:1;overflow-y:auto;padding:8px}
.plant-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:10px;cursor:pointer;
  transition:all 0.2s;margin-bottom:4px;
  border:2px solid transparent;
}
.plant-item:hover{background:#f5f5f5}
.plant-item.selected{border-color:#4caf50;background:#e8f5e9}
.plant-thumb{
  width:44px;height:44px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.plant-name{font-size:13px;font-weight:700;color:#1a2e1a}
.plant-family{font-size:11px;color:#78909c}
.disease-count{
  margin-left:auto;background:#ffebee;color:#e53935;
  font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;
}

/* CENTER: Analysis area */
.center-panel{background:#f0f4f0;padding:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden;min-height:0}

.image-display{
  flex:1;
  background:white;
  border-radius:16px;
  border:2px dashed #c8e6c9;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.2s;
  min-height:0;
}
.image-display:hover{border-color:#4caf50}

.leaf-canvas-wrap{
  position:relative;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
canvas#leafCanvas{max-width:100%;max-height:100%;border-radius:8px}

.scan-overlay{
  position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,transparent,#4caf50,transparent);
  animation:scanDown 2s linear infinite;
  opacity:0;
}
.scan-overlay.active{opacity:1}
@keyframes scanDown{
  from{top:0} to{top:calc(100% - 3px)}
}

.analyze-btn{
  background:linear-gradient(135deg,#2e7d32,#1b5e20);
  color:white;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;font-weight:800;border:none;
  padding:12px;border-radius:12px;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.5px;
  box-shadow:0 4px 16px rgba(46,125,50,0.4);
  flex-shrink:0;
}
.analyze-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(46,125,50,0.5)}
.analyze-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

.samples-strip{display:flex;gap:8px;flex-shrink:0;overflow-x:auto;padding:2px}
.sample-btn{
  flex-shrink:0;
  background:white;border:2px solid #e0e0e0;
  border-radius:10px;padding:6px 10px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;transition:all 0.2s;
}
.sample-btn:hover,.sample-btn.selected{border-color:#4caf50;background:#f1f8e9}
.sample-emoji{font-size:20px}
.sample-lbl{font-size:10px;font-weight:700;color:#555}

/* RIGHT: Results */
.right-panel{
  background:white;
  border-left:1px solid #e0e0e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.result-header{padding:14px 16px;background:#1a2e1a;color:white}
.result-header h3{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#a5d6a7}

.result-body{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}

.verdict-card{border-radius:12px;padding:14px;text-align:center}
.verdict-healthy{background:#e8f5e9;border:2px solid #4caf50}
.verdict-diseased{background:#fce4ec;border:2px solid #e53935}
.verdict-warn{background:#fff8e1;border:2px solid #ffb300}
.verdict-icon{font-size:40px;margin-bottom:6px}
.verdict-title{font-size:18px;font-weight:800;margin-bottom:4px}
.verdict-conf{font-size:13px;color:#546e7a;font-family:'Fira Code',monospace}

.prob-list{display:flex;flex-direction:column;gap:6px}
.prob-item{display:flex;flex-direction:column;gap:3px}
.prob-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700}
.prob-bar-wrap{height:6px;background:#f5f5f5;border-radius:3px;overflow:hidden}
.prob-bar{height:100%;border-radius:3px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}

.recommendation{background:#e3f2fd;border-radius:10px;padding:12px;border-left:3px solid #1976d2}
.rec-title{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#1565c0;margin-bottom:6px;text-transform:uppercase}
.rec-step{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#37474f;margin-bottom:5px;line-height:1.4}
.rec-num{width:18px;height:18px;border-radius:50%;background:#1976d2;color:white;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

.waiting-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:#90a4ae;text-align:center;padding:20px}
.waiting-icon{font-size:48px;opacity:0.4}
.waiting-text{font-size:13px;line-height:1.6}

.ai-thinking{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;text-align:center}
.thinking-dots{display:flex;gap:6px;justify-content:center}
.tdot{width:10px;height:10px;border-radius:50%;background:#4caf50;animation:dotBounce 1.2s ease-in-out infinite}
.tdot:nth-child(2){animation-delay:0.2s}
.tdot:nth-child(3){animation-delay:0.4s}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-8px);opacity:1}}
.thinking-label{font-size:13px;font-weight:700;color:#1a2e1a;font-family:'Fira Code',monospace}
.thinking-log{font-size:11px;color:#78909c;font-family:'Fira Code',monospace;text-align:left;background:#f5f5f5;border-radius:6px;padding:8px;max-height:80px;overflow:hidden}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <span class="badge">MODÜL 5</span>
    <h1>🤖 AI Tarlada: Bitki Hastalığı Tespiti</h1>
  </div>
  <div class="acc-display">
    <div class="acc-val">94.2%</div>
    <div class="acc-lbl">MODEL DOĞRULUĞU</div>
  </div>
</div>

<div class="main">
  <!-- LEFT: Plant list -->
  <div class="left-panel">
    <div class="panel-header">🌿 Bitki Seç</div>
    <div class="plant-list" id="plantList"></div>
  </div>

  <!-- CENTER -->
  <div class="center-panel">
    <div class="samples-strip" id="samplesStrip">
      <!-- Samples loaded dynamically -->
    </div>
    <div class="image-display" id="imageDisplay">
      <div class="leaf-canvas-wrap">
        <canvas id="leafCanvas" width="300" height="260"></canvas>
      </div>
      <div class="scan-overlay" id="scanOverlay"></div>
    </div>
    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">🔬 AI Analizi Başlat</button>
  </div>

  <!-- RIGHT: Results -->
  <div class="right-panel">
    <div class="result-header"><h3>🧬 AI Analiz Sonuçları</h3></div>
    <div class="result-body" id="resultBody">
      <div class="waiting-state">
        <div class="waiting-icon">🔬</div>
        <div class="waiting-text">Sol panelden bitki seç, örnek seç ve "AI Analizi Başlat" butonuna tıkla.</div>
      </div>
    </div>
  </div>
</div>

<script>
const plants = [
  {emoji:'🌾',name:'Buğday',family:'Poaceae',diseases:5,color:'#f9a825'},
  {emoji:'🍅',name:'Domates',family:'Solanaceae',diseases:8,color:'#e53935'},
  {emoji:'🌽',name:'Mısır',family:'Poaceae',diseases:4,color:'#ffb300'},
  {emoji:'🫑',name:'Biber',family:'Solanaceae',diseases:6,color:'#66bb6a'},
  {emoji:'🥔',name:'Patates',family:'Solanaceae',diseases:7,color:'#8d6e63'},
  {emoji:'🌿',name:'Nohut',family:'Fabaceae',diseases:3,color:'#9ccc65'},
];

const samples = {
  '🌾': [
    {label:'Pas Hastalığı',disease:'Wheat Rust',healthy:false,conf:96,
     color:'#8B4513',spotColor:'#ff8c00',probs:[{l:'Yaprak Pası (P.triticina)',p:96,c:'#e53935'},{l:'Sarı Pas',p:3,c:'#ffb300'},{l:'Sağlıklı',p:1,c:'#4caf50'}],
     rec:['Propikonazol bazlı fungusit uygula','30m² çevre karantina al','5 gün sonra kontrol et']},
    {label:'Külleme',disease:'Powdery Mildew',healthy:false,conf:88,
     color:'#a0a0a0',spotColor:'#e0e0e0',probs:[{l:'Külleme (B.graminis)',p:88,c:'#e53935'},{l:'Sağlıklı',p:8,c:'#4caf50'},{l:'Sarı Pas',p:4,c:'#ffb300'}],
     rec:['Kükürt bazlı fungusit uygula','Hava nemine dikkat et','Sulama saatini değiştir']},
    {label:'Sağlıklı',disease:'Healthy',healthy:true,conf:99,
     color:'#4caf50',spotColor:null,probs:[{l:'Sağlıklı',p:99,c:'#4caf50'},{l:'Yaprak Pası',p:1,c:'#e53935'},{l:'Külleme',p:0.5,c:'#ffb300'}],
     rec:[]},
  ],
  '🍅': [
    {label:'Erken Yanıklık',disease:'Early Blight',healthy:false,conf:92,
     color:'#2d5a1b',spotColor:'#8B4513',probs:[{l:'Erken Yanıklık (A.solani)',p:92,c:'#e53935'},{l:'Geç Yanıklık',p:6,c:'#ff7043'},{l:'Sağlıklı',p:2,c:'#4caf50'}],
     rec:['Mancozeb fungusit 15 gün arayla','Alt yaprakları kes','Su birikimini önle']},
    {label:'Mozaik Virüsü',disease:'TMV',healthy:false,conf:85,
     color:'#3a5a2a',spotColor:'#ffeb3b',probs:[{l:'Tütün Mozaik Virüsü',p:85,c:'#e53935'},{l:'Sarı Yaprak',p:10,c:'#ffb300'},{l:'Sağlıklı',p:5,c:'#4caf50'}],
     rec:['Virüslü bitkileri uzaklaştır','Böcek vektörlerini kontrol et','Temiz alet kullan']},
    {label:'Sağlıklı',disease:'Healthy',healthy:true,conf:97,
     color:'#1a6b1a',spotColor:null,probs:[{l:'Sağlıklı',p:97,c:'#4caf50'},{l:'Erken Yanıklık',p:2,c:'#e53935'},{l:'Virüs',p:1,c:'#ffb300'}],
     rec:[]},
  ],
  '🌽': [
    {label:'Kuzey Yanıklığı',disease:'Northern Blight',healthy:false,conf:90,
     color:'#2a4a1a',spotColor:'#8b6914',probs:[{l:'Kuzey Yaprak Yanıklığı',p:90,c:'#e53935'},{l:'Güney Yanıklığı',p:7,c:'#ff7043'},{l:'Sağlıklı',p:3,c:'#4caf50'}],
     rec:['Dirençli çeşit tercih et','Fungusit uygula','Tarla rotasyonu yap']},
    {label:'Sağlıklı',disease:'Healthy',healthy:true,conf:98,
     color:'#2d7a2d',spotColor:null,probs:[{l:'Sağlıklı',p:98,c:'#4caf50'},{l:'Kuzey Yanıklığı',p:1.5,c:'#e53935'},{l:'Pas',p:0.5,c:'#ffb300'}],
     rec:[]},
  ],
  '🫑':[
    {label:'Antraknoz',disease:'Anthracnose',healthy:false,conf:87,color:'#1a3d1a',spotColor:'#333',probs:[{l:'Antraknoz (C.capsici)',p:87,c:'#e53935'},{l:'Gri Küf',p:9,c:'#9e9e9e'},{l:'Sağlıklı',p:4,c:'#4caf50'}],rec:['Maneb fungusit uygula','Hava sirkülasyonu artır','Hasat öncesi kontrol']},
    {label:'Sağlıklı',disease:'Healthy',healthy:true,conf:98,color:'#2d7d32',spotColor:null,probs:[{l:'Sağlıklı',p:98,c:'#4caf50'},{l:'Antraknoz',p:2,c:'#e53935'}],rec:[]},
  ],
  '🥔':[
    {label:'Geç Yanıklık',disease:'Late Blight',healthy:false,conf:94,color:'#1a3010',spotColor:'#4a1a00',probs:[{l:'Geç Yanıklık (P.infestans)',p:94,c:'#e53935'},{l:'Erken Yanıklık',p:4,c:'#ff7043'},{l:'Sağlıklı',p:2,c:'#4caf50'}],rec:['Kimyasal fungusit acil uygula','Etkilenen bitkileri yok et','Tarlaya giriş kısıtla']},
    {label:'Sağlıklı',disease:'Healthy',healthy:true,conf:96,color:'#2d6a2d',spotColor:null,probs:[{l:'Sağlıklı',p:96,c:'#4caf50'},{l:'Geç Yanıklık',p:3,c:'#e53935'},{l:'Diğer',p:1,c:'#ffb300'}],rec:[]},
  ],
  '🌿':[
    {label:'Kök Çürüklüğü',disease:'Root Rot',healthy:false,conf:83,color:'#3a5a1a',spotColor:'#5a3010',probs:[{l:'Kök Çürüklüğü (F.solani)',p:83,c:'#e53935'},{l:'Solgunluk',p:12,c:'#ff7043'},{l:'Sağlıklı',p:5,c:'#4caf50'}],rec:['Drenaj iyileştir','Biyofungusit uygula','Ekim sıklığını azalt']},
    {label:'Sağlıklı',disease:'Healthy',healthy:true,conf:97,color:'#388e3c',spotColor:null,probs:[{l:'Sağlıklı',p:97,c:'#4caf50'},{l:'Kök Çürüklüğü',p:3,c:'#e53935'}],rec:[]},
  ],
};

let selectedPlant = null;
let selectedSample = null;
let analysisRunning = false;

// Build plant list
const plantListEl = document.getElementById('plantList');
plants.forEach((p,i) => {
  const div = document.createElement('div');
  div.className = 'plant-item';
  div.innerHTML = `<div class="plant-thumb" style="background:${p.color}22">${p.emoji}</div><div><div class="plant-name">${p.name}</div><div class="plant-family">${p.family}</div></div><div class="disease-count">${p.diseases}</div>`;
  div.addEventListener('click', () => {
    document.querySelectorAll('.plant-item').forEach(x=>x.classList.remove('selected'));
    div.classList.add('selected');
    selectedPlant = p;
    selectedSample = null;
    loadSamples(p.emoji);
    drawEmptyLeaf(p.color);
    resetResult();
  });
  plantListEl.appendChild(div);
});

function loadSamples(emoji) {
  const strip = document.getElementById('samplesStrip');
  strip.innerHTML = '';
  const samps = samples[emoji] || [];
  samps.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'sample-btn';
    btn.innerHTML = `<span class="sample-emoji">${s.healthy?'✅':'🍂'}</span><span class="sample-lbl">${s.label}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sample-btn').forEach(x=>x.classList.remove('selected'));
      btn.classList.add('selected');
      selectedSample = s;
      drawLeaf(selectedPlant.color, s);
      resetResult();
    });
    strip.appendChild(btn);
  });
}

function drawEmptyLeaf(color) {
  const canvas = document.getElementById('leafCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font = '60px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(selectedPlant?.emoji||'🌿', canvas.width/2, canvas.height/2);
  ctx.font = '13px Plus Jakarta Sans';
  ctx.fillStyle = '#90a4ae';
  ctx.fillText('Yukarıdan örnek seç', canvas.width/2, canvas.height/2+50);
}

function drawLeaf(plantColor, sample) {
  const canvas = document.getElementById('leafCanvas');
  const ctx = canvas.getContext('2d');
  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);

  // Background
  ctx.fillStyle = '#e8f5e9';
  ctx.fillRect(0,0,w,h);

  // Leaf shape
  ctx.save();
  ctx.translate(w/2, h/2);
  const grad = ctx.createRadialGradient(0,0,10,0,0,120);
  grad.addColorStop(0, sample.color);
  grad.addColorStop(1, adjustColor(sample.color,-30));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0,0,90,120,Math.PI*0.1,0,Math.PI*2);
  ctx.fill();

  // Veins
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0,-110); ctx.lineTo(0,110); ctx.stroke();
  [-40,-25,-10,10,25,40].forEach(y=>{
    ctx.beginPath(); ctx.moveTo(0,y);
    const dx = y<0?-60:60; const dy2 = y-20;
    ctx.quadraticCurveTo(dx*0.5,dy2,dx,dy2-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,y);
    ctx.quadraticCurveTo(-dx*0.5,dy2,-dx,dy2-10); ctx.stroke();
  });

  // Disease spots
  if(sample.spotColor) {
    for(let i=0;i<8;i++){
      const sx=(Math.random()-0.5)*140;
      const sy=(Math.random()-0.5)*180;
      const r=4+Math.random()*12;
      ctx.fillStyle = sample.spotColor;
      ctx.globalAlpha=0.7+Math.random()*0.3;
      ctx.beginPath();
      ctx.ellipse(sx,sy,r,r*0.8,Math.random()*Math.PI,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // Label
  ctx.fillStyle = '#546e7a';
  ctx.font = '12px Plus Jakarta Sans';
  ctx.textAlign = 'center';
  ctx.fillText(sample.label + (sample.healthy?' 🌱':' ⚠️'), w/2, h-14);
}

function adjustColor(hex, amount){
  try {
    const r=parseInt(hex.slice(1,3),16)+amount;
    const g=parseInt(hex.slice(3,5),16)+amount;
    const b=parseInt(hex.slice(5,7),16)+amount;
    return `rgb(${Math.max(0,Math.min(255,r))},${Math.max(0,Math.min(255,g))},${Math.max(0,Math.min(255,b))})`;
  } catch(e){ return hex; }
}

function resetResult() {
  document.getElementById('resultBody').innerHTML = `
    <div class="waiting-state"><div class="waiting-icon">🔬</div><div class="waiting-text">"AI Analizi Başlat" butonuna tıkla!</div></div>`;
}

async function runAnalysis(){
  if(!selectedPlant||!selectedSample||analysisRunning) return;
  analysisRunning=true;
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;
  document.getElementById('scanOverlay').classList.add('active');

  const logs=['Görüntü ön işleme...','CNN katmanları çalışıyor...','Feature extraction...','Softmax sınıflandırma...','Sonuç derleniyor...'];
  document.getElementById('resultBody').innerHTML=`
    <div class="ai-thinking">
      <div class="thinking-dots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
      <div class="thinking-label" id="thinkLabel">Görüntü analiz ediliyor...</div>
      <div class="thinking-log" id="thinkLog"></div>
    </div>`;

  for(let i=0;i<logs.length;i++){
    await sleep(500);
    document.getElementById('thinkLabel').textContent=logs[i];
    document.getElementById('thinkLog').textContent+=`> ${logs[i]}\n`;
  }
  await sleep(400);
  document.getElementById('scanOverlay').classList.remove('active');
  showResult(selectedSample);
  analysisRunning=false;
  btn.disabled=false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function showResult(s){
  const verdictClass = s.healthy?'verdict-healthy':'verdict-diseased';
  const verdictIcon = s.healthy?'✅':'🔴';
  const verdictTitle = s.healthy?'Sağlıklı Bitki':'Hastalık Tespit Edildi!';
  const verdictColor = s.healthy?'#2e7d32':'#c62828';

  const probsHtml = s.probs.map(p=>`
    <div class="prob-item">
      <div class="prob-label"><span>${p.l}</span><span style="color:${p.c}">${p.p}%</span></div>
      <div class="prob-bar-wrap"><div class="prob-bar" style="width:0%;background:${p.c}" data-pct="${p.p}"></div></div>
    </div>`).join('');

  const recHtml = s.rec.length>0?`
    <div class="recommendation">
      <div class="rec-title">💊 AI Önerisi</div>
      ${s.rec.map((r,i)=>`<div class="rec-step"><div class="rec-num">${i+1}</div><span>${r}</span></div>`).join('')}
    </div>`:'<div style="background:#e8f5e9;border-radius:8px;padding:10px;font-size:12px;color:#2e7d32;font-weight:600">🌱 Bitki sağlıklı! Mevcut bakım koşullarına devam et.</div>';

  document.getElementById('resultBody').innerHTML=`
    <div class="${verdictClass} verdict-card">
      <div class="verdict-icon">${verdictIcon}</div>
      <div class="verdict-title" style="color:${verdictColor}">${verdictTitle}</div>
      <div class="verdict-conf">Güven: %${s.conf}</div>
    </div>
    <div><div style="font-size:10px;font-weight:800;letter-spacing:2px;color:#90a4ae;text-transform:uppercase;margin-bottom:8px">📊 Sınıf Olasılıkları</div>
    <div class="prob-list">${probsHtml}</div></div>
    ${recHtml}`;

  setTimeout(()=>{
    document.querySelectorAll('.prob-bar').forEach(b=>{ b.style.width=b.dataset.pct+'%'; });
  },50);
}

// Init - draw blank canvas
const defaultCanvas = document.getElementById('leafCanvas');
const dctx = defaultCanvas.getContext('2d');
dctx.fillStyle='#f5f5f5';
dctx.fillRect(0,0,300,260);
dctx.font='50px serif'; dctx.textAlign='center'; dctx.textBaseline='middle';
dctx.fillText('🌿',150,120);
dctx.font='13px sans-serif'; dctx.fillStyle='#90a4ae';
dctx.fillText('Sol panelden bitki seç →',150,200);
</script>
</body>
</html>
